version: 1
updated_by: kr8tiv-team-execution-resilience

agents:
  friday:
    primary: claude-cli/claude-opus-4-6
    fallback:
      - anthropic/claude-opus-4-6

  arsenal:
    primary: codex-cli/gpt-5.4
    fallback:
      - openai-codex/gpt-5.4

  jocasta:
    primary: nvidia/moonshotai/kimi-k2.5
    fallback: []

  edith:
    primary: google-gemini-cli/gemini-3-pro-preview
    fallback:
      - google/gemini-3-pro-preview

policy:
  lock_model_routes: true
  allow_runtime_override: false
  require_mission_control_approval_for_route_changes: true
  strict_provider_affinity:
    friday: anthropic
    arsenal: openai-codex
    jocasta: nvidia
    edith: google
  fallback_on:
    - rate_limit
    - provider_cooldown
    - billing_disabled
    - auth_profile_unavailable
